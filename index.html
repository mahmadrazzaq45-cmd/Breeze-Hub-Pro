<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breeze Hub Pro | Advanced Weather App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="container">
    <div class="weather-card">

      <!-- Header -->
      <div class="header">
        <h1><i class="fas fa-cloud-sun"></i> Breeze Hub Pro</h1>
        <button id="locationBtn" class="location-btn">
          <i class="fas fa-location-dot"></i> Current Location
        </button>
      </div>

      <!-- Search Box -->
      <div class="search-box">
        <input type="text" id="cityInput" placeholder="Enter city name...">
        <button id="searchBtn">
          <i class="fas fa-search"></i> Search
        </button>
      </div>

      <!-- Search History -->
      <div class="history-section" id="historySection">
        <span>Recent:</span>
        <div id="historyList"></div>
      </div>

      <!-- Weather Content -->
      <div id="weatherContent">
        <div class="placeholder">
          <i class="fas fa-cloud-moon" style="font-size: 50px; opacity: 0.5;"></i>
          <p>Search any city to get accurate weather data 🌍</p>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
